<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firescout_경상남도 공고서 샘플</title>
  <style>
    body {
      margin: 0;
      padding: 40px 60px;
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
      background-color: #f3f3f3;
      color: #111;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .top-bar {
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-block;
      text-decoration: none;
      color: #0056b3;
      font-size: 18px;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }


    .page-title {
      display: inline-block;
      border: none;
      padding: 0;
      font-size: 32px;
      font-weight: 700;
      background: transparent;
      margin-bottom: 20px;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .file-link {
      display: flex;
      align-items: center;     
      justify-content: center;

      background: #fff;
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 24px 18px;

      font-size: 24px;
      font-weight: 700;
      color: #111;
      text-decoration: none;

      text-align: center;
      line-height: 1.4;
     }

    .file-link:hover {
      border-color: #0056b3;
      color: #0056b3;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    @media (max-width: 1000px) {
      .file-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 24px;
      }

      .file-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 24px;
      }

      .file-link {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="../region.html" class="back-link">← 지역 선택으로 돌아가기</a>
    </div>

    <div class="page-title">경상남도 공고서 샘플</div>

    <div class="file-grid">
      <a class="file-link" href="../files/region/gyeongsangnam-do/창원시 2026년 공동주택 관리지원사업 공고문 20251208.pdf" target="_blank">
        창원시 2026년 공동주택 관리지원사업 공고문
      </a>
    </div>
  </div>
</body>
</html>
