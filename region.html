<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firescout_지역별 공고서샘플</title>
  <style>
    body {
      margin: 0;
      padding: 40px 60px;
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
      background-color: #f3f3f3;
      color: #111;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .top-bar {
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-block;
      text-decoration: none;
      color: #0056b3;
      font-size: 18px;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .page-title {
      display: inline-block;
      border: none;
      padding: 0;
      font-size: 32px;
      font-weight: 700;
      background: transparent;
      margin-bottom: 20px;
    }

    .region-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    .region-link {
      display: block;
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 24px 18px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #111;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .region-link:hover {
      border-color: #0056b3;
      color: #0056b3;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    @media (max-width: 1000px) {
      .region-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 24px;
      }

      .region-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 24px;
      }

      .region-link {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
    </div>

    <div class="page-title">지역별 공고서 샘플</div>

    <div class="region-grid">
      <a class="region-link" href="region_html/Seoul.html">서울</a>
      <a class="region-link" href="region_html/Gyeonggi-do.html">경기도</a>
      <a class="region-link" href="region_html/Gangwon-do.html">강원도</a>
      <a class="region-link" href="region_html/Gyeongsangnam-do.html">경상남도</a>
    </div>
  </div>
</body>
</html>
